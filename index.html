<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0b1020" />
    <title>Расходы</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <div class="app">
      <div class="app-glow" aria-hidden="true"></div>
      <header class="app-header">
        <div class="app-header-row">
          <h1>Расходы</h1>
          <div class="status">
            <span class="status-dot"></span>
            <span>оффлайн</span>
          </div>
        </div>
        <nav class="tabs" role="tablist">
          <button class="tab is-active" data-tab="add" role="tab" aria-selected="true">Добавить</button>
          <button class="tab" data-tab="history" role="tab" aria-selected="false">История</button>
          <button class="tab" data-tab="analytics" role="tab" aria-selected="false">Аналитика</button>
          <button class="tab" data-tab="settings" role="tab" aria-selected="false">Настройки</button>
        </nav>
      </header>
      <main id="view" class="view"></main>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
